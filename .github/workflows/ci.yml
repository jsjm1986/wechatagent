name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  baseline:
    name: Baseline gate (R11.6)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with full history for diff)
        uses: actions/checkout@v4
        with:
          # check-no-human-takeover 需要 BASE..HEAD 增量扫描；fetch-depth: 0
          # 把整段历史拉下来才能在 PR 路径上比 main。
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2

      - name: cargo test --lib (R11.6 baseline part 1)
        run: cargo test --lib

      - name: scripts/check-baseline.sh (lib + 4 PBT files)
        shell: bash
        run: bash scripts/check-baseline.sh

      - name: scripts/check-no-human-takeover.sh (literal lint)
        shell: bash
        env:
          # PR 路径：与目标分支 diff；push 到 main 时与上一个 commit diff。
          BASE_REF: ${{ github.event.pull_request.base.ref || 'HEAD~1' }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash scripts/check-no-human-takeover.sh "origin/${BASE_REF}" "HEAD"
          else
            bash scripts/check-no-human-takeover.sh "${BASE_REF}" "HEAD"
          fi

      - name: scripts/check-no-model-hint.sh (literal lint)
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || 'HEAD~1' }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash scripts/check-no-model-hint.sh "origin/${BASE_REF}" "HEAD"
          else
            bash scripts/check-no-model-hint.sh "${BASE_REF}" "HEAD"
          fi

      - name: scripts/check-evolution-isolation.sh (R1.6 / R8.4 / R9.4)
        shell: bash
        run: bash scripts/check-evolution-isolation.sh

  integration:
    name: Integration tests (Docker / testcontainers)
    runs-on: ubuntu-latest
    # 首次接入：101 个 #[ignore] 集成测试从未在 CI 跑过，bit-rot 几乎必然。
    # 先 continue-on-error 拿到真实绿/红体检报告，不阻塞合并；逐个修复后
    # 再视情况抬升为硬门（与 baseline 同级）。
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2

      # ubuntu-latest runner 预装 Docker daemon；testcontainers
      # （tests/common/mod.rs:116 `Mongo::default().start()`）自动拉起
      # 临时 MongoDB 容器，无需额外 service 声明。
      - name: cargo test -- --ignored (testcontainers MongoDB)
        run: cargo test -- --ignored
